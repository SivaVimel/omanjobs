<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#FFFFFF" />
<meta name="color-scheme" content="light" />

<title>Get DigitalOman.ai — Download for iPhone &amp; Android</title>
<meta name="description" content="Download DigitalOman.ai — Oman's privacy-first AI assistant. One tap takes you to the right store for your device: App Store on iPhone, iPad or Mac, Google Play on Android." />

<meta property="og:type" content="website" />
<meta property="og:title" content="Get DigitalOman.ai" />
<meta property="og:description" content="Download DigitalOman.ai on iPhone, iPad, Mac or Android — one link, the right store." />
<meta property="og:image" content="assets/logo.png" />

<meta name="apple-itunes-app" content="app-id=6760588911" />
<meta name="google-play-app" content="app-id=com.digitaloman.ai" />

<link rel="icon" href="assets/logo.png" type="image/png" sizes="any" />
<link rel="apple-touch-icon" href="assets/logo.png" />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

<style>
/* ── DigitalOman.ai — download page · LIGHT THEME (matches styles.css) ── */
:root{
  --bg:#FFFFFF; --bg-2:#F5F5F7; --surface:#FFFFFF; --surface-2:#FBFBFD;
  --border:rgba(0,0,0,0.08); --border-soft:rgba(0,0,0,0.05); --border-cyan:rgba(0,172,193,0.30);
  --black:#1D1D1F; --silver:#424245; --silver-2:#6E6E73; --muted:#86868B; --dim:#A1A1A6;
  --cyan:#00ACC1; --cyan-bright:#00BCD4; --cyan-deep:#00838F; --cyan-glow:rgba(0,172,193,0.20);
  --radius-sm:10px; --radius:16px; --radius-lg:24px; --radius-xl:32px;
  --font:"Inter",-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",Roboto,system-ui,sans-serif;
  --mono:"JetBrains Mono","SF Mono",ui-monospace,monospace;
  --maxw:1180px; --pad:clamp(20px,4vw,40px);
}
*{box-sizing:border-box}
html{-webkit-text-size-adjust:100%}
body{margin:0;background:var(--bg);color:var(--black);font-family:var(--font);
  font-feature-settings:"ss01","cv11";-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;
  line-height:1.5;overflow-x:hidden;min-height:100vh;min-height:100dvh;display:flex;flex-direction:column}
body::before{content:"";position:fixed;inset:0;z-index:0;pointer-events:none;
  background:radial-gradient(1200px 600px at 80% -10%,rgba(0,172,193,0.07),transparent 60%),
             radial-gradient(900px 500px at 0% 30%,rgba(0,0,0,0.015),transparent 60%)}
a{color:inherit;text-decoration:none}
button{font-family:inherit;cursor:pointer}
::selection{background:var(--cyan);color:#fff}
.nav,main,.footer{position:relative;z-index:1}

/* ── NAV ── */
.nav{position:sticky;top:0;z-index:50;backdrop-filter:saturate(180%) blur(20px);
  -webkit-backdrop-filter:saturate(180%) blur(20px);background:rgba(255,255,255,0.72);
  border-bottom:1px solid rgba(0,0,0,0.06)}
.nav-inner{max-width:var(--maxw);margin:0 auto;padding:13px var(--pad);
  display:flex;align-items:center;justify-content:space-between;gap:20px}
.brand{display:inline-flex;align-items:center;gap:10px;font-weight:600;letter-spacing:-0.015em}
.brand img{width:28px;height:28px;display:block}
.brand-text{font-size:18px;display:inline-flex;align-items:baseline}
.brand-silver{background:linear-gradient(180deg,#1D1D1F 0%,#424245 100%);-webkit-background-clip:text;background-clip:text;color:transparent}
.brand-cyan{background:linear-gradient(180deg,#00BCD4 0%,#00838F 100%);-webkit-background-clip:text;background-clip:text;color:transparent}
.nav-cta{font-size:13px;font-weight:600;padding:9px 16px;border-radius:999px;
  background:var(--black);color:#fff;border:1px solid var(--black);
  display:inline-flex;align-items:center;gap:8px;
  transition:transform .15s ease,box-shadow .2s ease,background .2s ease}
.nav-cta:hover{transform:translateY(-1px);background:#2C2C2E;box-shadow:0 8px 24px rgba(0,0,0,0.15)}
.nav-cta svg{width:14px;height:14px}

/* ── HERO / CARD ── */
.wrap{flex:1;display:flex;align-items:center;justify-content:center;
  padding:clamp(48px,9vh,110px) var(--pad) clamp(40px,7vh,80px);position:relative;isolation:isolate}
.hero-glow{position:absolute;inset:-10% -10% auto -10%;height:80vh;z-index:-1;pointer-events:none;
  background:radial-gradient(55% 55% at 50% 15%,rgba(0,172,193,0.12),transparent 70%),
            radial-gradient(40% 40% at 78% 60%,rgba(0,188,212,0.07),transparent 70%);filter:blur(20px)}
.card{width:100%;max-width:600px;text-align:center;
  background:radial-gradient(90% 100% at 50% 0%,rgba(0,172,193,0.05),transparent 60%),#FFFFFF;
  border:1px solid var(--border);border-radius:var(--radius-xl);
  padding:clamp(34px,5vw,56px) clamp(26px,4vw,52px) clamp(30px,4vw,44px);
  box-shadow:0 1px 2px rgba(0,0,0,0.03),0 24px 60px rgba(0,0,0,0.08);
  animation:rise .55s cubic-bezier(.2,.7,.2,1) both}
@keyframes rise{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}

.eyebrow{display:inline-block;font-size:12px;font-weight:500;letter-spacing:0.16em;text-transform:uppercase;
  color:var(--cyan-deep);margin:0 0 24px;padding:6px 14px;border:1px solid var(--border-cyan);
  border-radius:999px;background:rgba(0,172,193,0.06)}

.applogo{width:104px;height:104px;margin:0 auto 22px;border-radius:26px;display:grid;place-items:center;
  background:radial-gradient(90% 90% at 50% 15%,#3A3A3D 0%,#2A2A2A 70%);
  border:1px solid var(--border-cyan);
  box-shadow:0 1px 2px rgba(0,0,0,0.04),0 18px 44px rgba(0,172,193,0.20)}
.applogo img{width:66px;height:66px;display:block}

h1{font-size:clamp(30px,6vw,50px);line-height:1.05;letter-spacing:-0.035em;font-weight:700;
  margin:0 0 12px;color:var(--black)}
h1 .cyan{background:linear-gradient(180deg,#00BCD4 0%,#00838F 100%);-webkit-background-clip:text;background-clip:text;color:transparent}
.sub{font-size:clamp(15px,1.5vw,18px);color:var(--silver);max-width:44ch;margin:0 auto 6px;line-height:1.5}

.status{font-family:var(--mono);font-size:12.5px;color:var(--silver-2);margin:20px 0 26px;
  min-height:18px;display:inline-flex;align-items:center;gap:9px;justify-content:center}
.status .dot{width:7px;height:7px;border-radius:50%;background:var(--cyan);
  box-shadow:0 0 0 0 var(--cyan-glow);animation:pulse 1.5s ease-out infinite}
@keyframes pulse{0%{box-shadow:0 0 0 0 var(--cyan-glow)}70%{box-shadow:0 0 0 9px transparent}100%{box-shadow:0 0 0 0 transparent}}

/* ── STORE BADGES (matched to site) ── */
.btns{display:flex;gap:16px;justify-content:center;align-items:stretch;flex-wrap:wrap}
.store-badge{position:relative;display:inline-flex;align-items:center;gap:16px;background:#000;color:#fff;
  padding:16px 28px 16px 24px;border-radius:18px;border:1px solid #000;min-width:250px;flex:1 1 250px;max-width:320px;
  isolation:isolate;overflow:hidden;box-shadow:0 6px 18px rgba(0,0,0,0.10);
  transition:transform .2s cubic-bezier(.2,.7,.2,1),box-shadow .3s ease,border-color .25s ease}
.store-badge::before{content:"";position:absolute;inset:0;z-index:-1;opacity:0;transition:opacity .3s ease;
  background:radial-gradient(140% 100% at 50% 0%,rgba(0,172,193,0.18),transparent 60%)}
.store-badge::after{content:"";position:absolute;inset:-2px;border-radius:inherit;z-index:-1;opacity:0;transition:opacity .35s ease;
  background:linear-gradient(140deg,transparent 30%,rgba(0,188,212,0.55) 50%,transparent 70%)}
.store-badge:hover{transform:translateY(-3px) scale(1.015);border-color:var(--cyan);
  box-shadow:0 22px 50px rgba(0,0,0,0.22),0 0 0 1px rgba(0,172,193,0.45),0 0 60px rgba(0,172,193,0.30)}
.store-badge:hover::before,.store-badge:hover::after{opacity:1}
.store-glyph{width:34px;height:34px;flex:0 0 34px;display:block}
.store-badge--apple .store-glyph{width:30px;height:34px;flex:0 0 30px;fill:#fff;margin-top:-2px}
.store-badge span{display:flex;flex-direction:column;line-height:1.05;text-align:left}
.store-badge small{font-size:12px;color:rgba(255,255,255,0.82);letter-spacing:0.04em}
.store-badge strong{font-size:21px;font-weight:600;letter-spacing:-0.005em;margin-top:4px;color:#fff}
/* recommended badge (matched device) gets a soft cyan ring + label */
.store-badge.rec{box-shadow:0 6px 18px rgba(0,0,0,0.10),0 0 0 3px rgba(0,172,193,0.22)}
.rec-flag{position:absolute;top:-1px;right:-1px;background:var(--cyan);color:#fff;font-family:var(--mono);
  font-size:9.5px;letter-spacing:0.1em;text-transform:uppercase;padding:3px 9px;border-bottom-left-radius:12px;z-index:2}
@media (max-width:560px){
  .store-badge{min-width:0;width:100%;flex:1 1 100%;max-width:none;padding:15px 22px}
  .store-badge strong{font-size:20px}
}

.hint{font-family:var(--mono);font-size:12px;color:var(--dim);margin:26px 0 0;line-height:1.6}
.hint a{color:var(--silver-2);border-bottom:1px solid var(--border);transition:color .16s,border-color .16s}
.hint a:hover{color:var(--cyan-deep);border-color:var(--border-cyan)}
.foot-note{margin:22px 0 0;font-size:13px;color:var(--silver-2);display:inline-flex;align-items:center;gap:8px;justify-content:center}
.foot-note .d{width:6px;height:6px;border-radius:50%;background:var(--cyan);box-shadow:0 0 14px var(--cyan)}

/* ── FOOTER ── */
.footer{border-top:1px solid var(--border-soft);background:#FFFFFF;padding:26px var(--pad)}
.footer-bar{max-width:var(--maxw);margin:0 auto;display:flex;justify-content:space-between;align-items:center;
  gap:10px;flex-wrap:wrap;font-size:12px;color:var(--muted)}
.footer-bar a{color:var(--silver-2);transition:color .2s ease}
.footer-bar a:hover{color:var(--cyan-deep)}
.footer-links{display:inline-flex;gap:18px;flex-wrap:wrap}

@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
</head>
<body>

<!-- ── NAV ── -->
<header class="nav">
  <div class="nav-inner">
    <a class="brand" href="https://digitaloman.ai/" aria-label="DigitalOman.ai home">
      <img src="assets/logo.png" alt="" />
      <span class="brand-text"><span class="brand-silver">Digital</span><span class="brand-cyan">Oman</span><span class="brand-silver">.ai</span></span>
    </a>
    <a class="nav-cta" href="https://digitaloman.ai/">
      Visit site
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 17 17 7M8 7h9v9"/></svg>
    </a>
  </div>
</header>

<!-- ── HERO CARD ── -->
<main class="wrap">
  <div class="hero-glow" aria-hidden="true"></div>
  <section class="card">
    <div class="applogo" aria-hidden="true"><img src="assets/logo.png" alt="" /></div>

    <h1>Get <span class="cyan">DigitalOman.ai</span></h1>
    <p class="sub">Oman's privacy-first AI assistant — offline on your phone, on every device.</p>

    <div class="status" id="status">
      <span class="dot"></span><span id="statusText">Detecting your device…</span>
    </div>

    <div class="btns" id="btns"><!-- injected --></div>

    <p class="hint" id="hint"></p>
    <p class="foot-note"><span class="d"></span> No account. No tracking. No servers in between.</p>
  </section>
</main>

<!-- ── FOOTER ── -->
<footer class="footer">
  <div class="footer-bar">
    <span>© <span id="year">2026</span> DigitalOman.ai</span>
    <span class="footer-links">
      <a href="https://digitaloman.ai/">Home</a>
      <a href="https://appsupport.digitaloman.ai/">Support</a>
      <a href="https://appprivacy.digitaloman.ai/">Privacy</a>
    </span>
  </div>
</footer>

<script>
(function(){
  var PLAY  = "https://play.google.com/store/apps/details?id=com.digitaloman.ai";
  var APPLE = "https://apps.apple.com/om/app/digitaloman-ai/id6760588911";
  var REDIRECT_DELAY = 900; // brief pause so the user sees where they're headed, then auto-redirect

  var G_APPLE = '<svg class="store-glyph" viewBox="0 0 24 24" aria-hidden="true" fill="currentColor"><path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.81-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83zM13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/></svg>';
  var G_PLAY  = '<svg class="store-glyph" viewBox="0 0 32 32" aria-hidden="true"><path fill="#34A853" d="M3.6 2.6C3.2 3 3 3.5 3 4.2v23.6c0 .7.2 1.2.6 1.6L16.3 16 3.6 2.6z"/><path fill="#FBBC04" d="M22.5 11.5 17.5 16l5 4.5 5.4-3c1-.6 1-2.4 0-3l-5.4-3z"/><path fill="#4285F4" d="M3.6 2.6 16.3 16l4.6-4.5L6.7 1.6c-.7-.4-2-.5-3.1 1z"/><path fill="#EA4335" d="M16.3 16 3.6 29.4c1.1 1.5 2.4 1.4 3.1 1l14.2-9.9L16.3 16z"/></svg>';

  function appleBadge(rec){
    return '<a class="store-badge store-badge--apple'+(rec?' rec':'')+'" href="'+APPLE+'" data-store="apple" aria-label="Download on the App Store">'
      + (rec?'<span class="rec-flag">Your device</span>':'')
      + G_APPLE + '<span><small>Download on the</small><strong>App Store</strong></span></a>';
  }
  function playBadge(rec){
    return '<a class="store-badge store-badge--google'+(rec?' rec':'')+'" href="'+PLAY+'" data-store="play" aria-label="Get it on Google Play">'
      + (rec?'<span class="rec-flag">Your device</span>':'')
      + G_PLAY + '<span><small>GET IT ON</small><strong>Google Play</strong></span></a>';
  }

  function detect(){
    var ua = navigator.userAgent || "";
    var plat = navigator.platform || "";
    var maxTouch = navigator.maxTouchPoints || 0;
    // iPadOS 13+ reports as "Macintosh" but has a touchscreen
    var iPadOS = /Macintosh/.test(ua) && maxTouch > 1;
    if (/android/i.test(ua)) return "android";
    if (/iPhone|iPad|iPod/i.test(ua) || iPadOS) return "apple";
    if (/Macintosh|Mac OS X/i.test(ua) || /^Mac/.test(plat)) return "apple";
    return "other";
  }

  var os = detect();
  var btns = document.getElementById('btns');
  var statusEl = document.getElementById('status');
  var statusText = document.getElementById('statusText');
  var hint = document.getElementById('hint');

  var target = null, label = "";
  if (os === "android"){ target = PLAY;  label = "Google Play"; }
  else if (os === "apple"){ target = APPLE; label = "the App Store"; }

  if (target){
    // recommended store first, other store still available as a fallback
    btns.innerHTML = (os === "apple") ? appleBadge(true) + playBadge(false)
                                      : playBadge(true) + appleBadge(false);
    statusText.textContent = "Taking you to " + label + "…";
    hint.innerHTML = 'Not redirected automatically? <a href="'+target+'">Tap here to open '+label+'</a>.';

    var go = function(){ window.location.replace(target); };
    var timer = setTimeout(go, REDIRECT_DELAY);
    // if the user taps the recommended badge first, let their tap navigate instead of the timer
    var recBadge = btns.querySelector('.store-badge.rec');
    if (recBadge) recBadge.addEventListener('click', function(){ clearTimeout(timer); });
  } else {
    // desktop / unknown — show both, no auto-redirect
    statusEl.style.display = "none";
    btns.innerHTML = appleBadge(false) + playBadge(false);
    hint.innerHTML = "Choose your platform — or open this page on your phone to jump straight to the store.";
  }
})();
</script>
</body>
</html>
